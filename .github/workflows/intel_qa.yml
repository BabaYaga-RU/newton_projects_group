name: process test

on:
  schedule:
    - cron: "45 4 1,4,7,10,13,16,19,22,25,28 * *" 
  workflow_dispatch:

jobs:
  sync_docs:
    runs-on: ubuntu-latest
    permissions:
      discussions: write
      contents: read
    steps:
      - name: Random Entry Delay
        run: sleep $(( ( RANDOM % 780 ) + 120 ))

      - name: Technical Documentation Sync
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}
        run: |
          REPO_INFO=$(gh api graphql -f query='{repository(owner:"BabaYaga-RU",name:"newton_projects_group"){id,discussionCategories(first:10){nodes{id,name}}}}')
          REPO_ID=$(echo $REPO_INFO | jq -r '.data.repository.id')
          CATEGORY_ID=$(echo $REPO_INFO | jq -r '.data.repository.discussionCategories.nodes[] | select(.name=="General") | .id')

          TITLES=(
            "Documentation: Handling race conditions in high-frequency polling"
            "Technical Note: Jitter-based exponential backoff implementation"
            "Architecture: Data integrity during peak market volatility"
            "Optimization: Memory management in long-running monitor processes"
            "SRE Report: Node stability under concurrent API requests"
          )
          SELECTED_TITLE=${TITLES[$RANDOM % ${#TITLES[@]}]}

          DISCUSSION_DATA=$(gh api graphql -f query='
            mutation($repoId: ID!, $categoryId: ID!, $title: String!, $body: String!) {
              createDiscussion(input: {repositoryId: $repoId, categoryId: $categoryId, title: $title, body: $body}) {
                discussion { id }
              }
            }' -f repoId="$REPO_ID" -f categoryId="$CATEGORY_ID" -f title="$SELECTED_TITLE" -f body="System log: Documentation request for $SELECTED_TITLE implementation details.")

          DISCUSSION_ID=$(echo $DISCUSSION_DATA | jq -r '.data.createDiscussion.discussion.id')
          
          sleep $(( ( RANDOM % 360 ) + 300 ))

          DOC_BODY="The system utilizes atomic write operations and locking mechanisms to ensure consistency. Details are available in the monitor.py source comments. Verification complete."
          
          COMMENT_DATA=$(gh api graphql -f query='
            mutation($discId: ID!, $body: String!) {
              addDiscussionComment(input: {discussionId: $discId, body: $body}) {
                comment { id }
              }
            }' -f discId="$DISCUSSION_ID" -f body="$DOC_BODY")

          COMMENT_ID=$(echo $COMMENT_DATA | jq -r '.data.addDiscussionComment.comment.id')

          sleep $(( ( RANDOM % 120 ) + 60 ))

          gh api graphql -f query='
            mutation($commentId: ID!) {
              markDiscussionCommentAsAnswer(input: {id: $commentId}) {
                discussion { answer { id } }
              }
            }' -f commentId="$COMMENT_ID"
          
          echo "Process finished for $SELECTED_TITLE at $(date)"
