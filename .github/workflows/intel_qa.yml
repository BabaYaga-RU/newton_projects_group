name: Technical Documentation Sync

on:
  schedule:
    - cron: "45 4 1,4,7,10,13,16,19,22,25,28 * *"
  workflow_dispatch:

jobs:
  sync_docs:
    runs-on: ubuntu-latest
    permissions:
      discussions: write
      contents: read
    steps:
      - name: Random Entry Delay
        run: sleep $(( ( RANDOM % 780 ) + 120 ))

      - name: Execute Discussion Sync
        env:
          TOKEN_SECONDARY: ${{ secrets.GH_TOKEN_LAB }}
          TOKEN_PRIMARY: ${{ secrets.ACTIONS_DEPLOY_KEY }}
        run: |
          REPO_INFO=$(GH_TOKEN=$TOKEN_SECONDARY gh api graphql -f query='{
            repository(owner:"BabaYaga-RU", name:"newton_projects_group"){
              id
              discussionCategories(first:10){
                nodes{ id, name, isAnswerable }
              }
            }
          }')
          
          REPO_ID=$(echo $REPO_INFO | jq -r '.data.repository.id')
          CATEGORY_ID=$(echo $REPO_INFO | jq -r '.data.repository.discussionCategories.nodes[] | select(.isAnswerable==true) | .id')

          if [ -z "$CATEGORY_ID" ] || [ "$CATEGORY_ID" == "null" ]; then
            echo "Erro: Categoria Q&A não encontrada."
            exit 1
          fi

          PREFIXES=(
            "Documentation:"
            "Technical Note:"
            "Architecture:"
            "Optimization:"
            "SRE Report:"
            "Analysis:"
            "Review:"
            "Implementation:"
            "Investigation:"
            "Update:"
          )

          TOPICS=(
            "race conditions in high-frequency polling"
            "jitter-based exponential backoff implementation"
            "data integrity during peak market volatility"
            "memory management in long-running monitor processes"
            "node stability under concurrent API requests"
            "connection pool exhaustion handling"
            "distributed lock timeout strategies"
            "async task queue optimization"
            "cache invalidation patterns"
            "circuit breaker implementation"
            "retry mechanism with exponential backoff"
            "dead letter queue handling"
            "graceful shutdown procedures"
            "health check endpoint design"
            "rate limiting strategies"
            "websocket reconnection logic"
            "database connection pooling"
            "event-driven architecture patterns"
            "message deduplication strategies"
            "idempotency in distributed systems"
          )

          BODIES=(
            "System log: Technical request regarding system optimization and performance tuning."
            "Automated report: Analysis of system behavior under high load conditions."
            "Technical documentation: Implementation details for distributed system components."
            "SRE analysis: Investigation of system stability and reliability metrics."
            "Architecture review: Evaluation of current system design and proposed improvements."
            "Performance report: Analysis of response times and throughput metrics."
            "Incident report: Post-mortem analysis of system behavior during peak load."
            "Technical specification: Detailed implementation guidelines for new features."
            "System update: Changes to core infrastructure and deployment procedures."
            "Code review: Analysis of implementation patterns and best practices."
            "Infrastructure report: Evaluation of resource utilization and scaling strategies."
            "Security analysis: Review of authentication and authorization mechanisms."
            "Monitoring update: Changes to alerting thresholds and metrics collection."
            "Deployment notes: Procedures for zero-downtime releases."
            "Capacity planning: Analysis of resource requirements for projected growth."
          )

          SELECTED_PREFIX=${PREFIXES[$RANDOM % ${#PREFIXES[@]}]}
          SELECTED_TOPIC=${TOPICS[$RANDOM % ${#TOPICS[@]}]}
          SELECTED_BODY=${BODIES[$RANDOM % ${#BODIES[@]}]}
          SELECTED_TITLE="$SELECTED_PREFIX $SELECTED_TOPIC"

          DISCUSSION_DATA=$(GH_TOKEN=$TOKEN_SECONDARY gh api graphql -f query='
            mutation($repoId: ID!, $categoryId: ID!, $title: String!, $body: String!) {
              createDiscussion(input: {repositoryId: $repoId, categoryId: $categoryId, title: $title, body: $body}) {
                discussion { id }
              }
            }' -f repoId="$REPO_ID" -f categoryId="$CATEGORY_ID" -f title="$SELECTED_TITLE" -f body="$SELECTED_BODY")

          DISCUSSION_ID=$(echo $DISCUSSION_DATA | jq -r '.data.createDiscussion.discussion.id')
          
          sleep $(( ( RANDOM % 360 ) + 300 ))

          DOC_BODIES=(
            "The system utilizes atomic write operations and locking mechanisms to ensure consistency. Details are available in the source comments."
            "Implementation follows the retry pattern with exponential backoff and jitter. See the configuration documentation for parameter details."
            "The solution involves implementing a circuit breaker pattern to prevent cascade failures. Reference architecture diagrams are available."
            "Memory optimization achieved through object pooling and lazy initialization strategies. Performance benchmarks are documented."
            "The monitoring system uses health checks and graceful degradation patterns. Alert thresholds are configured in the monitoring module."
            "Data consistency is maintained through optimistic locking and version tracking. Transaction logs provide audit trails."
            "The caching layer implements LRU eviction with TTL-based invalidation. Cache warming strategies are documented."
            "Connection management uses pool-based allocation with configurable timeout values. Pool metrics are exposed via the monitoring endpoint."
            "The event processing pipeline uses backpressure mechanisms to handle load spikes. Throughput metrics are available in the dashboard."
            "Error handling follows the fail-fast pattern with comprehensive logging. Error codes are documented in the API reference."
            "The deployment strategy uses blue-green releases with automated rollback capabilities. Deployment scripts are version controlled."
            "Security measures include input validation, rate limiting, and authentication token rotation. Security policies are documented."
            "The logging system uses structured logging with correlation IDs for request tracking. Log aggregation is configured in the monitoring stack."
            "Performance optimization involves query optimization, indexing strategies, and connection pooling. Database performance metrics are monitored."
            "The system implements graceful shutdown with in-flight request completion. Shutdown procedures are documented in the operations guide."
          )
          DOC_BODY=${DOC_BODIES[$RANDOM % ${#DOC_BODIES[@]}]}
          
          COMMENT_DATA=$(GH_TOKEN=$TOKEN_PRIMARY gh api graphql -f query='
            mutation($discId: ID!, $body: String!) {
              addDiscussionComment(input: {discussionId: $discId, body: $body}) {
                comment { id }
              }
            }' -f discId="$DISCUSSION_ID" -f body="$DOC_BODY")

          COMMENT_ID=$(echo $COMMENT_DATA | jq -r '.data.addDiscussionComment.comment.id')

          sleep $(( ( RANDOM % 120 ) + 60 ))

          GH_TOKEN=$TOKEN_SECONDARY gh api graphql -f query='
            mutation($commentId: ID!) {
              markDiscussionCommentAsAnswer(input: {id: $commentId}) {
                discussion { answer { id } }
              }
            }' -f commentId="$COMMENT_ID"
          
          echo "Process finished for $SELECTED_TITLE at $(date)"
