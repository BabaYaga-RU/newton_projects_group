name: Legacy Backfill Arthur Long

on: 
  workflow_dispatch:

# Dá permissão explícita de escrita para o token nativo do GitHub
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Usa o token nativo para evitar erros de 403/libcrypto
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Config Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Buffer alto para evitar o Erro 5 no push de 1200 commits
          git config --global http.postBuffer 524288000

      - name: Run Backfill Script
        run: python legacy_fill.py

      - name: Push Changes
        run: |
          # Força o push usando o token da sessão atual
          git push origin main --force
