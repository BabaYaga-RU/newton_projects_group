name: Legacy Backfill Arthur Long

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Config Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global http.postBuffer 524288000

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ACTIONS_DEPLOY_KEY }}

      - name: Run Backfill Script
        run: python legacy_fill.py

      - name: Push Changes via SSH
        run: |
          # Muda a URL de HTTPS para SSH (mais estável para push pesado)
          git remote set-url origin git@github.com:${{ github.repository }}.git
          
          # Garante que o host seja confiável
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          
          # Push forçado para reescrever o histórico de 2025
          git push origin main --force
