name: Legacy Backfill Arthur Long

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5 # Atualizado para v5
        with:
          python-version: '3.11' # Versão estável

      - name: Config Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Aumenta o buffer para aguentar o volume de commits (previne erro 5)
          git config --global http.postBuffer 524288000

      - name: Run Backfill Script
        run: python legacy_fill.py

      - name: Push Changes
        run: |
          git config --local --unset-all http.https://github.com/.extraheader
          
          # Configura a URL com o token
          git remote set-url origin https://x-access-token:${{ secrets.ACTIONS_DEPLOY_KEY }}@github.com/${{ github.repository }}.git
          
          # Força a sincronização. O --force ajuda se houver conflito de histórico.
          git push origin main --force
