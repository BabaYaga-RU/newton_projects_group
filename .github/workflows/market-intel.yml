name: Market Intel Sync

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Core
        run: pip install duckduckgo_search

      - name: Identity Config
        run: |
          git config --global user.name "BabaYaga-RU"
          git config --global user.email "p201952589703@gmail.com"

      - name: Buffer Delay
        if: github.event_name == 'schedule'
        run: sleep $(( ( RANDOM % 903 ) + 2700 ))

      - name: Run Market Analysis
        id: snap
        run: |
          BRANCH_ID="intel/sync-$(openssl rand -hex 3)"
          echo "B_ID=$BRANCH_ID" >> $GITHUB_OUTPUT
          git checkout -b $BRANCH_ID
          
          python monitor.py
          git add .
          
          MSG="chore(intel): update global trend intelligence $(date +'%Y.%m.%d')"
          CO="Co-authored-by: arthurperico <arthurperico1212@gmail.com>"
          
          git commit -m "$MSG" -m "$CO"
          git push https://x-access-token:${{ secrets.ACTIONS_DEPLOY_KEY }}@github.com/${{ github.repository }}.git $BRANCH_ID

      - name: Validation Pause
        if: github.event_name == 'schedule'
        run: sleep $(( ( RANDOM % 120 ) + 300 ))

      - name: Commit & Merge PR
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}
        run: |
          TITLE="intel: sync snapshot $(date +'%H%M')"
          BODY="Automated ingestion of retail market trends and consumer behavior data."
          
          PR_URL=$(gh pr create --title "$TITLE" --body "$BODY" --base main --head ${{ steps.snap.outputs.B_ID }})
          
          if [ "${{ github.event_name }}" = "schedule" ]; then
            sleep $(( ( RANDOM % 180 ) + 420 ))
          fi
          
          gh pr merge "$PR_URL" --squash --delete-branch --admin
