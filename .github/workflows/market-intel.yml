name: Market Intel Sync - Random Stealth 100

on:
  schedule:
    - cron: "*/5 * * * *" 
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup & Identity
        run: |
          pip install duckduckgo_search
          git config --global user.name "BabaYaga-RU"
          git config --global user.email "p201952589703@gmail.com"

      - name: Human Delay Before Start
        run: sleep $(( ( RANDOM % 50 ) + 15 ))

      - name: Run Market Analysis
        id: snap
        run: |
          BRANCH_ID="intel/sync-$(date +%s)"
          echo "B_ID=$BRANCH_ID" >> $GITHUB_OUTPUT
          git checkout -b $BRANCH_ID
          
          python monitor.py
          git add .
          
          MSG="chore(intel): update snapshot $(date +'%H%M%S')"
          CO="Co-authored-by: arthurperico <arthurperico1212@gmail.com>"
          
          git commit -m "$MSG" -m "$CO"
          git push origin $BRANCH_ID

      - name: Validation Pause
        run: sleep $(( ( RANDOM % 60 ) + 20 ))

      - name: Commit & Merge PR
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}
        run: |
          TITLE="intel: sync $(date +'%M%S')"
          BODY="Automated market data sync process."

          PR_URL=$(gh pr create --title "$TITLE" --body "$BODY" --base main --head ${{ steps.snap.outputs.B_ID }})
          
          # Pausa aleatória entre 45 e 120 segundos para simular "tempo de análise"
          sleep $(( ( RANDOM % 75 ) + 45 ))
          
          gh pr merge "$PR_URL" --squash --delete-branch --admin
