name: Market Intel Sync - Random Stealth 100

on:
  schedule:
    - cron: "*/5 * * * *" 
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup & Identity
        run: |
          pip install duckduckgo_search
          git config --global user.name "BabaYaga-RU"
          git config --global user.email "p201952589703@gmail.com"

      - name: Human Delay Before Start
        run: sleep $(( ( RANDOM % 50 ) + 15 ))

      # --- BLOCO DE BOOST DE VIEWS (ESTRATÉGIA PROXY) ---
      - name: Boost Profile Views (High Intensity)
        run: |
          URL_BABA="https://komarev.com/ghpvc/?username=BabaYaga-RU&color=00FF41&style=for-the-badge"
          URL_PK="https://komarev.com/ghpvc/?username=PkLavc&color=00d1ff&style=for-the-badge"
          
          echo "Buscando lista de proxies frescos..."
          # Obtém uma lista de proxies HTTP gratuitos para rotacionar o IP
          curl -s "https://api.proxyscrape.com/v2/?request=displayproxies&protocol=http&timeout=1000&country=all&ssl=all&anonymity=all" > proxies.txt
          
          echo "Iniciando ataque de views com IPs rotativos..."
          count=0
          # O loop lê os proxies e dispara as requisições em paralelo
          while read -r line && [ $count -lt 50 ]; do
            # User-Agent realista para cada requisição
            UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
            
            # Dispara em background (&) para ganhar velocidade
            curl -x "$line" -A "$UA" -s -m 5 "$URL_BABA" > /dev/null && echo "Hit BabaYaga via $line" &
            curl -x "$line" -A "$UA" -s -m 5 "$URL_PK" > /dev/null && echo "Hit PkLavc via $line" &
            
            count=$((count+1))
            # Pequeno delay para o sistema de arquivos processar os logs
            sleep 0.1
          done < proxies.txt
          
          wait
          echo "Rajada de views finalizada com proxies."

      - name: Run Market Analysis
        id: snap
        run: |
          BRANCH_ID="intel/sync-$(date +%s)"
          echo "B_ID=$BRANCH_ID" >> $GITHUB_OUTPUT
          git checkout -b $BRANCH_ID
          
          python monitor.py
          git add .
          
          MSG="chore(intel): update snapshot $(date +'%H%M%S')"
          CO="Co-authored-by: arthurperico <arthurperico1212@gmail.com>"
          
          git commit -m "$MSG" -m "$CO"
          git push origin $BRANCH_ID

      - name: Validation Pause
        run: sleep $(( ( RANDOM % 60 ) + 20 ))

      - name: Commit & Merge PR
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}
        run: |
          TITLE="intel: sync $(date +'%M%S')"
          BODY="Automated market data sync process."

          PR_URL=$(gh pr create --title "$TITLE" --body "$BODY" --base main --head ${{ steps.snap.outputs.B_ID }})
          
          sleep $(( ( RANDOM % 75 ) + 45 ))
          
          gh pr merge "$PR_URL" --squash --delete-branch --admin
