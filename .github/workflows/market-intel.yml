name: Market Intel Sync - Enterprise Data

on:
  schedule:
    - cron: "*/5 * * * *" 
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup & Identity
        run: |
          pip install duckduckgo_search
          git config --global user.name "BabaYaga-RU"
          git config --global user.email "p201952589703@gmail.com"

      - name: Human Delay Before Start
        run: sleep $(( ( RANDOM % 30 ) + 10 ))

      - name: Process Market Snapshots
        id: snap
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}
        run: |
          git pull origin main --rebase

          BRANCH_ID="intel/update-$(date +%s)"
          git checkout -b "$BRANCH_ID"
          
          python monitor.py
          git add .
          
          if ! git diff --cached --quiet; then
            MSG="chore(intel): update global trend intelligence $(date +'%Y.%m.%d %H:%M')"
            CO="Co-authored-by: arthurperico <arthurperico1212@gmail.com>"
            
            git commit -m "$MSG" -m "$CO"
            git push origin "$BRANCH_ID"

            TITLE="feat(intel): sync market snapshot $(date +'%Y.%m.%d')"
            BODY="Periodic synchronization of global market intelligence data. Automated update for trend analysis."

            PR_URL=$(gh pr create --title "$TITLE" --body "$BODY" --base main --head "$BRANCH_ID")
            sleep $(( ( RANDOM % 60 ) + 40 ))
            
            gh pr merge "$PR_URL" --squash --delete-branch --admin
          else
            echo "No delta found in snapshots."
          fi
