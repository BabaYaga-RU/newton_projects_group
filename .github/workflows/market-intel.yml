name: Market Intel Sync - Enterprise Data

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}

      - name: Setup & Identity
        run: |
          pip install ddgs  # Atualizado para evitar o warning
          git config --global user.name "BabaYaga-RU"
          git config --global user.email "p201952589703@gmail.com"

      - name: Process Market Snapshots
        id: snap
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}
        run: |
          # Garante que estamos na main limpa
          git checkout main
          git pull origin main --rebase

          BRANCH_ID="intel/update-$(date +%s)"
          git checkout -b "$BRANCH_ID"
          
          python monitor.py
          git add .
          
          if ! git diff --cached --quiet; then
            MSG="chore(intel): update global trend intelligence $(date +'%Y.%m.%d %H:%M')"
            CO="Co-authored-by: arthurperico <arthurperico1212@gmail.com>"
            
            git commit -m "$MSG" -m "$CO"
            git push origin "$BRANCH_ID"

            TITLE="feat(intel): sync market snapshot $(date +'%Y.%m.%d')"
            BODY="Automated update."

            # Cria o PR e captura a URL limpa
            PR_URL=$(gh pr create --title "$TITLE" --body "$BODY" --base main --head "$BRANCH_ID" --json url -q .url)
            
            # O SEGREDO: --auto e --admin juntos forçam o merge assim que a API liberar, 
            # sem que o script retorne erro de 'not mergeable'
            gh pr merge "$PR_URL" --squash --delete-branch --admin --auto || \
            (sleep 5 && gh pr merge "$PR_URL" --squash --delete-branch --admin)

            echo "merged=true" >> $GITHUB_OUTPUT
          else
            echo "No delta found."
            echo "merged=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger next run
        if: always()
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_DEPLOY_KEY }}
        run: |
          gh workflow run "Market Intel Sync - Enterprise Data" || echo "Cron window wait."
