<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <title>Contato</title>
        <link rel="stylesheet" href="assents/css/general.css">
        <link rel="stylesheet" href="assents/css/contacts.css">
    </head>
    <body>
        <div>
            <h1 style="text-align: center;"> Faça a sua solitação de contato</h1>
            <form action="resposta.php" method="get">
                <label for="nome">Nome: </label>
                <input type="text" nome="nome" placeholder="Seu nome aqui">
                </br>
                <label for="endereco">Endereço: </label>
                <input type="text" nome="rua" placeholder="Sua Rua aqui">
                </br>
                <label for="bairro">Bairro: </label>
                <input type="text" nome="bairro" placeholder="Seu Bairro aqui">
                <label for="cidade">Cidade: </label>
                <input type="text" name="cidade" placeholder="Sua Cidade aqui">
                </br>   
                <label type="cep">CEP</label>
                <input type="number" name="cep" value="Seu Cep" max="9999999">  
                <label for="estado">Estado</label>
                <select name="estado">
                    <option value="1">Acre (AC)</option>
                    <option value="2">Alagoas (AL)</option>
                    <option value="3">Amapá (AP)</option>
                    <option value="4">Amazonas (AM)</option>
                    <option value="5">Bahia (BA)</option>
                    <option value="6">Ceará (CE)</option>
                    <option value="7">Espírito Santo (ES)</option>
                    <option value="8">Goiás (GO) e Distrito Federal (DF)</option>
                    <option value="9">Maranhão (MA)</option>
                    <option value="10">Mato Grosso (MT)</option>
                    <option value="11">Mato Grosso do Sul (MS)</option>
                    <option value="12" selected>Minas Gerais (MG)</option>
                    <option value="13">Pará (PA)</option>
                    <option value="14">Paraíba (PB)</option>
                    <option value="15">Paraná (PR)</option>
                    <option value="16">Pernambuco (PE)</option>
                    <option value="17">Piauí (PI)</option>
                    <option value="18">Rio de Janeiro (RJ)</option>
                    <option value="19">Rio Grande do Norte (RN)</option>
                    <option value="20">Rio Grande do Sul (RS)</option>
                    <option value="21">Rondônia (RO)</option>
                    <option value="22">Roraima (RR)</option>
                    <option value="23">Santa Catarina (SC)</option>
                    <option value="24">São Paulo (SP)</option>
                    <option value="25">Sergipe (SE)</option>
                    <option value="26">Tocantins (TO)</option>
                </select>
                </br>
                <label for="preferencia">Preferência: </label>
                <input type="checkbox"> Campo
                <input type="checkbox"> Montanha
                <input type="checkbox"> Litoral
                </br>
                <label for="tipo_viagem">Tipo de viagem: </label>
                <input type="radio"> Negócios
                <input type="radio"> Passeio
                </br>
                <label for="sugestao">Sugestão: </label></br>
                <textarea name="sugestao" placeholder="Digite aqui a sua sugestão"></textarea>
                </br>
                <input type="submit" name="enviar">
            </form>
        </div>
    </body>
</html>
